<ion-item-sliding #sliding>
  <ion-item>
    <ion-avatar class="person">
      <img *ngIf="!userInput.image" alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
      <img *ngIf="userInput.image" alt="Person picture" [src]="userInput.image" />
    </ion-avatar>
    <ion-label>{{userInput.subname}}, {{userInput.name}}</ion-label>
    <ion-label>{{userInput.vehicle}}</ion-label>
    <ion-item-option color="white">
      
      <ion-icon name="caret-forward-outline"></ion-icon>
    </ion-item-option>
    
  </ion-item>

 
  <ion-item-options side="end" >
    
    <ion-item-option (click)="onEditClick(sliding)">
      <ion-icon slot="top" name="create" ></ion-icon>
      {{'Editar' | uppercase}}
    </ion-item-option>
    <ion-item-option (click)="onDeleteClick(sliding)" color="danger" expandable="Borrar">
      <ion-icon slot="top" name="trash" ></ion-icon>
      {{'Borrar' | uppercase}}
    </ion-item-option>
  </ion-item-options>
</ion-item-sliding>
