<ion-header>
  <ion-toolbar>
    <ion-title>Datos del usuario</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="onDismiss(null)">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  
  <form [formGroup]="form" (ngSubmit)="onSubmit()" (keyup.enter)="onSubmit()">
    <ion-item-divider>
      <ion-label>
       Persona que la realiza
      </ion-label>
    </ion-item-divider>
    <app-park-selectable formControlName="idPark"></app-park-selectable>
    <ion-item-divider>
      <ion-label>
        Plaza a ocupar
      </ion-label>
    </ion-item-divider>
    <app-user-selectable formControlName="idUser"></app-user-selectable>
    <ion-item-divider>
      <ion-label>
       Fecha y hora
      </ion-label>
    </ion-item-divider>
  </form>
</ion-content>
<ion-footer>
  <ion-grid>
    <ion-row>
      <ion-col class="ion-text-center">
        <ion-button [disabled]="!form.valid" (click)="onSubmit()">{{button_text}}</ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-footer>
