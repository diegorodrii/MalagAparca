<ion-accordion-group [multiple]="true" #accordion>
  <ion-accordion value="first">
    <ion-item slot="header" color="light">
      <ng-container *ngIf="selectedPark!=null">
        <ion-avatar class="park">
          <img *ngIf="!selectedPark?.image" 
          src="/assets/plazaPredeterminada.jpg" />
          <img *ngIf="selectedPark?.image" alt="Park picture" [src]="selectedPark?.image" />
        </ion-avatar>
        <ion-label>{{selectedPark?.location}}</ion-label>
      </ng-container>
      <ion-label *ngIf="!selectedPark">Selecciona una plaza</ion-label>
    </ion-item>
    <div class="ion-padding" slot="content">
      <ion-list>
        <ion-item *ngFor="let park of getParks()" button detail (click)="onParkClicked(park, accordion)">
          <ion-avatar class="park">
            <img *ngIf="!park?.image" 
              src="/assets/plazaPredeterminada.jpg" />
            <img *ngIf="park?.image" alt="Park picture" [src]="park?.image" />
          </ion-avatar>
          <ion-label>{{park.location}}, {{park.vehicle}}</ion-label>
        </ion-item>
      </ion-list>
    </div>
  </ion-accordion>
</ion-accordion-group>
