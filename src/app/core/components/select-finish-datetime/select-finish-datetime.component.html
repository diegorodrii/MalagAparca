<ion-accordion-group [multiple]="true" #accordion>
  <ion-accordion value="first">
    <ion-item slot="header" color="light">

      <ng-container *ngIf="hasValue">
        <ion-label>{{(date$ | async) | date:'short'}}</ion-label>
      </ng-container>
      <ion-label *ngIf="!hasValue">Introduce una hora de finalización</ion-label>
    </ion-item>
    <div class="ion-padding" slot="content">
      <ion-datetime #finishsAt locale="es-ES" value="{{(date$ | async)}}" (ionChange)="onFinishsAtChanged($event, accordion)">
        <span slot="time-label">Tiempo</span> 
        <ion-buttons slot="buttons">
          <ion-button color="danger" (click)="onCancel(finishsAt, accordion)">Cancelar</ion-button>
          <ion-button color="primary" (click)="onConfirm(finishsAt, accordion)">Guardar</ion-button>
        </ion-buttons>
      </ion-datetime>
    </div>
  </ion-accordion>
</ion-accordion-group>
