<ion-header>
  <ion-toolbar>
    <ion-title>Formulario creación usuario</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="onDismiss(null)">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
  
</ion-header>

<ion-content>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" (keyup.enter)="onSubmit()">
    <ion-item>
      <ion-label position="floating"> Nombre </ion-label>
      <ion-input
      type="text"
      placeholder="Introduce un nombre"
      formControlName="name"
      ></ion-input>
    </ion-item>
    
    <ion-item>
      <ion-label position="floating"> Apellidos </ion-label>
      <ion-input
      type="text"
      placeholder="Introduce un apellido"
      formControlName="subname"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating"> Foto </ion-label>
      <ion-input
      type="text"
      placeholder="Introduce una foto"
      formControlName="image"
      ></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating"> Tipo de vehículo </ion-label>
      <ion-select type="text"
      placeholder="Introduce un tipo de vehículo"
      formControlName="vehicle" placeholder="Seleccione uno">
      <ion-select-option> Camión </ion-select-option>
      <ion-select-option> Coche </ion-select-option>
      <ion-select-option> Ciclomotor / Moto </ion-select-option>
      <ion-select-option> Bicicleta</ion-select-option>
    </ion-select>
      
    </ion-item>


    <ion-button [disabled]="!form.valid" type="submit">{{mode=="Edit"?"Modificar":"Añadir"}}</ion-button> 

  </form>
</ion-content>
