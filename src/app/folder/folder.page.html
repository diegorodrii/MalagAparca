<ion-header [translucent]="true">
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>{{ folder }}</ion-title>
    </ion-toolbar>
  </ion-header>
  
  <ion-content [fullscreen]="true" class="ion-padding">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">{{ folder }}</ion-title>
      </ion-toolbar>
    </ion-header>
    
    <app-home *ngIf="folder=='Home'"></app-home>    
    <app-people *ngIf="folder=='People'"></app-people>    
    <app-park *ngIf="folder=='Park'"></app-park>
    <app-assign *ngIf="folder=='Assign'"></app-assign>
    <app-contact *ngIf="folder=='Contact'"></app-contact>


    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button (click)="onNewItem()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  </ion-content>
